<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
<meta charset="UTF-8">
<title>마이페이지</title>

<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>

<body>

	<div th:replace="layout/header :: header"></div>

	<div class="container mypage">

		<!-- 좌측 사이드바 -->
		<aside class="mypage-sidebar">

			<!-- 프로필 -->
			<div class="profile-box">
				<a href="/mypage/profile">
					<div class="profile-img"></div>
					<p class="username" th:text="${user.username}">유저명</p>
					<p class="email" th:text="${user.email}">email</p>
				</a>
			</div>

			<!-- 메뉴 -->
			<ul class="menu">
				<li><a href="/mypage/orders">주문내역</a></li>
				<li><a href="/mypage/shipping">배송조회</a></li>
				<li><a href="/mypage/wishlist">찜한 상품</a></li>
				<li><a href="/mypage/recent">최근 본 상품</a></li>
				<li><a href="/mypage/returns">취소/반품/교환</a></li>
				<li><a href="/mypage/points">적립 포인트</a></li>
				<li><a href="/mypage/profile">내 프로필</a></li>
			</ul>

		</aside>

		<!-- 우측 메인 -->
		<main class="mypage-content">

			<!-- 기본 대시보드 -->
			<div class="dashboard">

				<!-- 요약 카드 -->
				<div class="summary-grid">

					<div class="card">
						<p class="card-title">총 주문</p>
						<p class="card-value" th:text="${orderCount}">0</p>
					</div>

					<div class="card">
						<p class="card-title">배송 중</p>
						<p class="card-value" th:text="${shippingCount}">0</p>
					</div>

					<div class="card">
						<p class="card-title">찜한 상품</p>
						<p class="card-value" th:text="${wishlistCount}">0</p>
					</div>

					<div class="card">
						<p class="card-title">포인트</p>
						<p class="card-value" th:text="|₩${points}|">0</p>
					</div>

				</div>

				<!-- 최근 주문 -->
				<div class="section">
					<h2>최근 주문</h2>

					<div class="order-list">
						<div class="order-item" th:each="order : ${recentOrders}">
							<p th:text="${order.productName}">상품명</p>
							<p th:text="|₩${order.price}|">가격</p>
							<p th:text="${order.status}">상태</p>
						</div>
					</div>
				</div>

			</div>

		</main>

	</div>

	<div th:replace="layout/footer :: footer"></div>

</body>
</html>
